<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1519 1231">
  <defs>
    <filter id="f1" filterUnits="userSpaceOnUse">
      <feOffset dy="20"/><feGaussianBlur stdDeviation="50" result="b"/><feFlood flood-color="#000" flood-opacity=".1"/><feComposite in2="b" operator="in"/><feComposite in="SourceGraphic"/>
    </filter>
    <filter id="f2" filterUnits="userSpaceOnUse">
      <feOffset/><feGaussianBlur stdDeviation="20" result="b"/><feFlood flood-color="#89d957" flood-opacity=".2"/><feComposite in2="b" operator="in"/><feComposite in="SourceGraphic"/>
    </filter>
    <filter id="f3" filterUnits="userSpaceOnUse">
      <feOffset dy="20"/><feGaussianBlur stdDeviation="50" result="b"/><feFlood flood-color="#000" flood-opacity=".1"/><feComposite in2="b" operator="in"/><feComposite in="SourceGraphic"/>
    </filter>
    <filter id="f4" filterUnits="userSpaceOnUse">
      <feOffset/><feGaussianBlur stdDeviation="20" result="b"/><feFlood flood-color="#89d957" flood-opacity=".3"/><feComposite in2="b" operator="in"/><feComposite in="SourceGraphic"/>
    </filter>
    <!-- Single reusable brand gradient — all bars share the same stops -->
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0" stop-color="#89d957"/>
      <stop offset=".63" stop-color="#abdd5e"/>
      <stop offset="1" stop-color="#c9e265"/>
    </linearGradient>
    <!-- Per-bar gradients reuse <g> via href, rotated to vertical -->
    <linearGradient id="g1" href="#g" gradientTransform="translate(-145.75 1229.04) rotate(-90) scale(1.01 .82)" gradientUnits="userSpaceOnUse" x1="355.59" y1="743.65" x2="569.23" y2="743.65"/>
    <linearGradient id="g2" href="#g" gradientTransform="translate(-41.03 1436.6) rotate(-90)" gradientUnits="userSpaceOnUse" x1="589.78" y1="738.82" x2="805.78" y2="738.82"/>
    <linearGradient id="g3" href="#g" gradientTransform="translate(250.16 1613.41) rotate(-90)" gradientUnits="userSpaceOnUse" x1="823.78" y1="681.63" x2="1039.78" y2="681.63"/>
    <linearGradient id="g4" href="#g" gradientTransform="translate(569.66 1761.91) rotate(-90)" gradientUnits="userSpaceOnUse" x1="1057.78" y1="596.13" x2="1273.78" y2="596.13"/>
    <linearGradient id="g5" href="#g" x1="180.92" y1="973.05" x2="275.92" y2="973.05" gradientUnits="userSpaceOnUse"/>
  </defs>

  <!-- Card background -->
  <rect fill="#fff" filter="url(#f1)" x="288.98" y="130.33" width="1080" height="864.07" rx="50.61"/>

  <!-- Bars -->
  <rect fill="url(#g1)" opacity=".4" x="391.37" y="653.66" width="144.01" height="215.95" rx="50.61" transform="translate(1225.01 298.26) rotate(90)"/>
  <rect fill="url(#g2)" opacity=".7" x="601.97" y="630.82" width="191.63" height="216" rx="50.61" transform="translate(1436.6 41.03) rotate(90)"/>
  <rect fill="url(#g3)" opacity=".8" x="778.78" y="573.63" width="306" height="216" rx="50.61" transform="translate(1613.41 -250.16) rotate(90)"/>
  <rect fill="url(#g4)" filter="url(#f2)" x="927.28" y="488.13" width="477" height="216" rx="50.61" transform="translate(1761.91 -569.66) rotate(90)"/>

  <!-- Bar labels -->
  <text font-family="Bahnschrift,sans-serif" font-size="34" opacity=".4" x="444.9" y="890.87">Q1</text>
  <text font-family="Bahnschrift,sans-serif" font-size="34" opacity=".5" x="676.47" y="890.87">Q2</text>
  <text font-family="Bahnschrift,sans-serif" font-size="34" opacity=".6" x="910.99" y="890.87">Q3</text>
  <text font-family="Bahnschrift,sans-serif" font-size="34" opacity=".7" x="1144.01" y="890.87">Q4</text>

  <!-- Header: Revenue label + amount -->
  <text font-family="Bahnschrift,sans-serif" font-size="34" fill="gray" x="359.78" y="224.45">Revenue</text>
  <text font-family="Bahnschrift,sans-serif" font-size="89" fill="#1a1a1a" x="355.78" y="317.65">$48,295</text>

  <!-- Badge: +14.2% -->
  <rect fill="#8cc63f" opacity=".2" stroke="#999" stroke-miterlimit="10" x="1120.93" y="186.73" width="184.98" height="57.8" rx="28.9"/>
  <line stroke="gray" stroke-width="3" stroke-miterlimit="10" fill="none" x1="1162.86" y1="226.72" x2="1162.86" y2="201.68"/>
  <polygon fill="gray" points="1167.95 207.66 1162.86 202.57 1157.77 207.66 1157.77 203.34 1162.86 198.26 1167.95 203.34 1167.95 207.66"/>
  <text font-family="Bahnschrift,sans-serif" font-size="29" fill="#666" x="1205.26" y="223.02">+14.2%</text>

  <!-- Floating badge card -->
  <rect fill="#fff" filter="url(#f3)" x="150.91" y="885.64" width="389.71" height="174.82" rx="50.61"/>
  <text font-family="Bahnschrift,sans-serif" font-size="34" fill="#1a1a1a" x="288.88" y="960.62">Best Quarter</text>
  <text font-family="Bahnschrift,sans-serif" font-size="21" fill="gray" x="288.88" y="990.96">Q4 2026</text>

  <!-- Badge icon circle -->
  <circle fill="url(#g5)" filter="url(#f4)" cx="228.42" cy="973.05" r="47.5"/>
  <!-- Trending up icon lines -->
  <g fill="none" stroke="#000" stroke-width="3" stroke-linecap="square" stroke-linejoin="bevel">
    <line x1="205.09" y1="982.07" x2="215.8" y2="971.42"/>
    <line x1="233.85" y1="982.06" x2="251.58" y2="964.19"/>
    <line x1="248.65" y1="975.24" x2="251.76" y2="964.84"/>
    <line x1="240.64" y1="967.19" x2="250.92" y2="964.02"/>
    <line x1="215.93" y1="971.4" x2="233.7" y2="982.07"/>
  </g>
</svg>